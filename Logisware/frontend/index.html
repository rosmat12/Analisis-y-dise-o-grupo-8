<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGISWARE - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="image/favicon.svg">
</head>
<body class="login-container">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow login-card">
                    <div class="card-body p-5 text-center">
                        <div class="mb-3">
    <img src="image/logo_logisware.svg" alt="LOGISWARE" style="max-width: 550px; width: 100%;">
</div>
                        <p class="text-muted mb-4">Gestión de Logística Postal</p>
                        
                        <form id="loginForm">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="username" placeholder="Usuario" required>
                                <label for="username">Usuario</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                                <label for="password">Contraseña</label>
                            </div>
                            <button class="w-100 btn btn-lg btn-primary" type="submit">Ingresar</button>
                        </form>
                        
                        <div id="errorMessage" class="alert alert-danger mt-3 d-none" role="alert">
                            Credenciales incorrectas. Intente nuevamente.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Validación simulada de usuario operador / administrador
            if (user === '1001' && pass === '1234') {
                // Guardamos el estado y el nombre del usuario en localStorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', user);
                
                // Redirección al panel principal
                window.location.href = 'paquete.html';
            } else {
                document.getElementById('errorMessage').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
